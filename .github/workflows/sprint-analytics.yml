name: Sprint Analytics

on:
  schedule:
    - cron: '0 9 * * 1'   # 매주 월요일 오전 9시 UTC
  push:
    branches: [main]
    paths:
      - '.github/workflows/sprint-analytics.yml'
      - 'scripts/collect_sprint_metrics.py'
  issues:
    types: [closed, reopened, labeled, unlabeled]
  workflow_dispatch:

permissions:
  contents: write
  issues:   read

jobs:
  sprint-analytics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Collect sprint metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: python scripts/collect_sprint_metrics.py

      - name: Upload sprint metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sprint-metrics-${{ github.run_id }}
          path: data/sprint-metrics.json
          retention-days: 90

      - name: Commit updated metrics and report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sprint-metrics.json reports/
          git diff --staged --quiet || git commit -m "chore: update sprint metrics [skip ci]"
          git push
