name: Lead Time Measurement

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      days:
        description: Analyze merged PRs in the last N days
        required: false
        default: "30"
      max_prs:
        description: Maximum merged PR count to analyze
        required: false
        default: "100"

permissions:
  contents: read

jobs:
  measure-single-pr:
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Calculate lead time for merged PR
        id: calc
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;

            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100
            });

            const commitDates = commits
              .map(c => c.commit?.author?.date)
              .filter(Boolean)
              .map(d => new Date(d));

            const firstCommitAt = commitDates.length
              ? new Date(Math.min(...commitDates.map(d => d.getTime())))
              : new Date(pr.created_at);

            const prCreatedAt = new Date(pr.created_at);
            const mergedAt = new Date(pr.merged_at);

            const leadTimeFromFirstCommitHours = Number(((mergedAt - firstCommitAt) / 36e5).toFixed(2));
            const leadTimeFromPrOpenHours = Number(((mergedAt - prCreatedAt) / 36e5).toFixed(2));

            const result = {
              repository: `${owner}/${repo}`,
              pr_number: pr.number,
              title: pr.title,
              first_commit_at: firstCommitAt.toISOString(),
              pr_created_at: prCreatedAt.toISOString(),
              merged_at: mergedAt.toISOString(),
              lead_time_hours_from_first_commit: leadTimeFromFirstCommitHours,
              lead_time_hours_from_pr_open: leadTimeFromPrOpenHours
            };

            const fileName = `lead-time-pr-${pr.number}.json`;
            fs.writeFileSync(fileName, JSON.stringify(result, null, 2));

            core.summary
              .addHeading('Lead Time (Merged PR)')
              .addRaw(`- PR #${pr.number}: ${pr.title}\n`)
              .addRaw(`- First commit → Merge: **${leadTimeFromFirstCommitHours}h**\n`)
              .addRaw(`- PR open → Merge: **${leadTimeFromPrOpenHours}h**\n`)
              .addRaw(`- Report file: ${fileName}\n`)
              .write();

            core.setOutput('report_file', fileName);

      - name: Upload PR lead time report
        uses: actions/upload-artifact@v4
        with:
          name: lead-time-pr-${{ github.event.pull_request.number }}
          path: ${{ steps.calc.outputs.report_file }}

  measure-aggregate:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Calculate aggregate lead time report
        id: aggregate
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const { owner, repo } = context.repo;
            const days = Number(context.payload.inputs?.days || 30);
            const maxPrs = Number(context.payload.inputs?.max_prs || 100);
            const since = new Date(Date.now() - days * 24 * 60 * 60 * 1000);

            const allClosedPrs = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'closed',
              sort: 'updated',
              direction: 'desc',
              per_page: 100
            });

            const mergedPrs = allClosedPrs
              .filter(pr => pr.merged_at && new Date(pr.merged_at) >= since)
              .slice(0, maxPrs);

            const rows = [];

            for (const pr of mergedPrs) {
              const commits = await github.paginate(github.rest.pulls.listCommits, {
                owner,
                repo,
                pull_number: pr.number,
                per_page: 100
              });

              const commitDates = commits
                .map(c => c.commit?.author?.date)
                .filter(Boolean)
                .map(d => new Date(d));

              const firstCommitAt = commitDates.length
                ? new Date(Math.min(...commitDates.map(d => d.getTime())))
                : new Date(pr.created_at);

              const mergedAt = new Date(pr.merged_at);
              const hours = Number(((mergedAt - firstCommitAt) / 36e5).toFixed(2));

              rows.push({
                pr_number: pr.number,
                title: pr.title,
                first_commit_at: firstCommitAt.toISOString(),
                merged_at: mergedAt.toISOString(),
                lead_time_hours_from_first_commit: hours
              });
            }

            const values = rows
              .map(r => r.lead_time_hours_from_first_commit)
              .filter(v => Number.isFinite(v))
              .sort((a, b) => a - b);

            const average = values.length
              ? Number((values.reduce((a, b) => a + b, 0) / values.length).toFixed(2))
              : null;

            const median = values.length
              ? (values.length % 2
                ? values[(values.length - 1) / 2]
                : Number(((values[values.length / 2 - 1] + values[values.length / 2]) / 2).toFixed(2)))
              : null;

            const percentile = (arr, p) => {
              if (!arr.length) return null;
              const idx = Math.min(arr.length - 1, Math.max(0, Math.ceil(p * arr.length) - 1));
              return arr[idx];
            };

            const p90 = percentile(values, 0.9);

            const result = {
              repository: `${owner}/${repo}`,
              analyzed_days: days,
              analyzed_pr_count: rows.length,
              lead_time_hours: {
                average,
                median,
                p90
              },
              prs: rows
            };

            const reportFile = `lead-time-report-last-${days}-days.json`;
            fs.writeFileSync(reportFile, JSON.stringify(result, null, 2));

            const topRows = rows
              .sort((a, b) => b.lead_time_hours_from_first_commit - a.lead_time_hours_from_first_commit)
              .slice(0, 10)
              .map(r => `| #${r.pr_number} | ${r.lead_time_hours_from_first_commit} | ${r.title.replaceAll('|', '\\|')} |`)
              .join('\n');

            core.summary
              .addHeading('Lead Time Aggregate Report')
              .addRaw(`- Period: last **${days}** days\n`)
              .addRaw(`- Analyzed merged PRs: **${rows.length}**\n`)
              .addRaw(`- Average: **${average ?? 'N/A'}h**\n`)
              .addRaw(`- Median: **${median ?? 'N/A'}h**\n`)
              .addRaw(`- P90: **${p90 ?? 'N/A'}h**\n\n`)
              .addRaw('| PR | Lead Time(h) | Title |\n')
              .addRaw('|---|---:|---|\n')
              .addRaw(`${topRows || '| - | - | No data |'}\n\n`)
              .addRaw(`- Report file: ${reportFile}\n`)
              .write();

            core.setOutput('report_file', reportFile);

      - name: Upload aggregate lead time report
        uses: actions/upload-artifact@v4
        with:
          name: lead-time-report
          path: ${{ steps.aggregate.outputs.report_file }}
