name: DORA Metrics Collection

on:
  push:
    branches: [main]
  pull_request:
    types: [closed]
  schedule:
    - cron: '0 0 * * *'   # 매일 자정 UTC 실행
  workflow_dispatch:       # 수동 실행 지원

permissions:
  contents: write
  issues: read
  pull-requests: read

jobs:
  collect-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 전체 커밋 히스토리 필요 (Lead Time 계산)

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Collect DORA metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: python scripts/collect_dora_metrics.py

      - name: Upload metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dora-metrics-${{ github.run_id }}
          path: data/metrics.json
          retention-days: 90

      - name: Generate latest report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: python scripts/generate_report.py

      - name: Commit updated data & report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/metrics.json reports/
          git diff --staged --quiet || git commit -m "chore: update DORA metrics [skip ci]"
          git push
