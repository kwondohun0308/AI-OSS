name: DORA Metrics

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1'

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Collect DORA metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node week2-dora-metrics/scripts/collect-dora-metrics.mjs > week2-dora-metrics/artifacts/dora-metrics.json

      - name: Generate weekly report
        run: node week2-dora-metrics/scripts/generate-weekly-report.mjs week2-dora-metrics/artifacts/dora-metrics.json

      - name: Upload JSON artifact
        uses: actions/upload-artifact@v4
        with:
          name: dora-metrics-json
          path: week2-dora-metrics/artifacts/dora-metrics.json

      - name: Upload weekly report artifact
        uses: actions/upload-artifact@v4
        with:
          name: dora-weekly-report
          path: week2-dora-metrics/reports/weekly-report.md
