<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="760" rx="0" fill="url(#bg)"/>
  <text x="60" y="70" fill="#e5e7eb" font-size="34" font-family="Arial, sans-serif" font-weight="700">DORA Metrics Dashboard</text>
  <text x="60" y="105" fill="#94a3b8" font-size="16" font-family="Arial, sans-serif">GitHub Actions 주간 수집 결과 시안</text>

  <g transform="translate(60,140)">
    <rect width="250" height="140" rx="18" fill="url(#card)" stroke="#334155"/>
    <text x="24" y="42" fill="#94a3b8" font-size="15" font-family="Arial, sans-serif">Lead Time</text>
    <text x="24" y="86" fill="#f8fafc" font-size="34" font-family="Arial, sans-serif" font-weight="700">18.4h</text>
    <text x="24" y="118" fill="#cbd5e1" font-size="14" font-family="Arial, sans-serif">PR 최초 커밋 → 머지</text>
  </g>
  <g transform="translate(335,140)">
    <rect width="250" height="140" rx="18" fill="url(#card)" stroke="#334155"/>
    <text x="24" y="42" fill="#94a3b8" font-size="15" font-family="Arial, sans-serif">Deployment Frequency</text>
    <text x="24" y="86" fill="#f8fafc" font-size="34" font-family="Arial, sans-serif" font-weight="700">6/week</text>
    <text x="24" y="118" fill="#cbd5e1" font-size="14" font-family="Arial, sans-serif">성공 배포 횟수</text>
  </g>
  <g transform="translate(610,140)">
    <rect width="250" height="140" rx="18" fill="url(#card)" stroke="#334155"/>
    <text x="24" y="42" fill="#94a3b8" font-size="15" font-family="Arial, sans-serif">MTTR</text>
    <text x="24" y="86" fill="#f8fafc" font-size="34" font-family="Arial, sans-serif" font-weight="700">3.1h</text>
    <text x="24" y="118" fill="#cbd5e1" font-size="14" font-family="Arial, sans-serif">Incident 등록 → 종료</text>
  </g>
  <g transform="translate(885,140)">
    <rect width="250" height="140" rx="18" fill="url(#card)" stroke="#334155"/>
    <text x="24" y="42" fill="#94a3b8" font-size="15" font-family="Arial, sans-serif">Change Failure Rate</text>
    <text x="24" y="86" fill="#f8fafc" font-size="34" font-family="Arial, sans-serif" font-weight="700">8.3%</text>
    <text x="24" y="118" fill="#cbd5e1" font-size="14" font-family="Arial, sans-serif">실패 배포 / 전체 배포</text>
  </g>

  <g transform="translate(60,320)">
    <rect width="670" height="360" rx="18" fill="#0f172a" stroke="#334155"/>
    <text x="24" y="42" fill="#e5e7eb" font-size="18" font-family="Arial, sans-serif" font-weight="700">최근 4주 Lead Time 추이</text>
    <polyline points="70,290 210,255 350,220 490,190 610,165" fill="none" stroke="#38bdf8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="70" cy="290" r="8" fill="#38bdf8"/>
    <circle cx="210" cy="255" r="8" fill="#38bdf8"/>
    <circle cx="350" cy="220" r="8" fill="#38bdf8"/>
    <circle cx="490" cy="190" r="8" fill="#38bdf8"/>
    <circle cx="610" cy="165" r="8" fill="#38bdf8"/>
  </g>

  <g transform="translate(760,320)">
    <rect width="380" height="360" rx="18" fill="#0f172a" stroke="#334155"/>
    <text x="24" y="42" fill="#e5e7eb" font-size="18" font-family="Arial, sans-serif" font-weight="700">배포 안정성 요약</text>
    <circle cx="190" cy="190" r="110" fill="none" stroke="#22c55e" stroke-width="42" stroke-dasharray="620 120" stroke-linecap="round" transform="rotate(-90 190 190)"/>
    <circle cx="190" cy="190" r="110" fill="none" stroke="#ef4444" stroke-width="42" stroke-dasharray="55 685" stroke-linecap="round" transform="rotate(40 190 190)"/>
    <text x="190" y="185" text-anchor="middle" fill="#f8fafc" font-size="30" font-family="Arial, sans-serif" font-weight="700">92%</text>
    <text x="190" y="220" text-anchor="middle" fill="#94a3b8" font-size="15" font-family="Arial, sans-serif">Success</text>
  </g>
</svg>
